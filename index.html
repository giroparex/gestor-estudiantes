<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Alumnos Pro - Cloud Sync</title>

    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";
        window.GoogleGenAI = GoogleGenAI;
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .student-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .student-card:hover { transform: translateY(-3px); shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: #6366f1; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect } = React;

    const GITHUB_REPO = "giroparex/gestor-estudiantes"; 
    const FILE_PATH = "alumnos.json";
    const COURSE_OPTIONS = ["LUNES A VIERNES", "V, S Y D", "INTENSIVO 1", "INTENSIVO 2"];

    const App = () => {
        const [students, setStudents] = useState([]);
        const [search, setSearch] = useState("");
        const [ghToken, setGhToken] = useState(localStorage.getItem('gh_token_seguro') || "");
        const [isSaving, setIsSaving] = useState(false);
        const [sortBy, setSortBy] = useState("name"); // "name" o "course"

        useEffect(() => {
            const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${FILE_PATH}?t=${Date.now()}`;
            fetch(url)
                .then(res => res.json())
                .then(data => { if (Array.isArray(data)) setStudents(data); })
                .catch(err => console.log("Iniciando con lista vacía."));
        }, []);

        const saveToGitHub = async () => {
            if (!ghToken) return alert("Introduce tu Token de GitHub.");
            setIsSaving(true);
            try {
                const resFile = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    headers: { Authorization: `token ${ghToken}` }
                });
                let sha = "";
                if (resFile.ok) { const fileData = await resFile.json(); sha = fileData.sha; }
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(students, null, 2))));
                const resUpdate = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: { Authorization: `token ${ghToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Sincronización manual", content, sha: sha || undefined })
                });
                if (resUpdate.ok) alert("✅ Guardado en la nube.");
            } catch (e) { alert("❌ Error de conexión."); }
            finally { setIsSaving(false); }
        };

        const addStudent = () => {
            const newS = { id: crypto.randomUUID(), name: "", email: "", phone1: "", phone2: "", course: "LUNES A VIERNES", age: 20, photo: null };
            setStudents([newS, ...students]);
        };

        // Lógica de filtrado y ordenado dual
        const processedStudents = [...students]
            .filter(s => s.name.toLowerCase().includes(search.toLowerCase()))
            .sort((a, b) => {
                if (sortBy === "course") {
                    // Primero ordena por curso, si son iguales, ordena por nombre
                    const courseCompare = a.course.localeCompare(b.course);
                    return courseCompare !== 0 ? courseCompare : a.name.localeCompare(b.name);
                }
                // Orden por defecto: Nombre
                return a.name.localeCompare(b.name);
            });

        return (
            <div className="max-w-6xl mx-auto p-4 md:p-8">
                <header className="no-print bg-white p-4 rounded-3xl shadow-sm border mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div className="flex items-center gap-2">
                        <span className="material-icons-round text-indigo-600">group</span>
                        <h1 className="font-black text-slate-800 tracking-tighter uppercase">Gestor Alumnos</h1>
                    </div>
                    <div className="flex flex-wrap justify-center gap-2">
                        <input 
                            type="password" 
                            placeholder="Token de GitHub"
                            className="border bg-slate-50 p-2 rounded-xl text-xs w-48 outline-none focus:ring-2 ring-indigo-500"
                            value={ghToken}
                            onChange={(e) => { setGhToken(e.target.value); localStorage.setItem('gh_token_seguro', e.target.value); }}
                        />
                        <button onClick={saveToGitHub} disabled={isSaving} className={`${isSaving ? 'bg-slate-400' : 'bg-emerald-600'} text-white px-5 py-2 rounded-xl font-bold text-xs hover:bg-emerald-700 transition-all shadow-md`}>
                            {isSaving ? "Guardando..." : "☁️ Guardar Cambios"}
                        </button>
                    </div>
                </header>

                <div className="no-print flex flex-wrap gap-4 mb-8 items-center bg-slate-200/50 p-4 rounded-[2rem]">
                    <div className="flex-1 min-w-[250px] relative">
                        <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 material-icons-round text-sm">search</span>
                        <input 
                            className="w-full pl-10 pr-4 py-4 rounded-2xl border-none shadow-sm outline-none focus:ring-2 ring-indigo-500 text-slate-700" 
                            placeholder="Buscar alumno..."
                            onChange={(e) => setSearch(e.target.value)}
                        />
                    </div>
                    
                    {/* SELECTOR DE ORDEN */}
                    <div className="flex items-center gap-3 bg-white px-4 py-3 rounded-2xl shadow-sm border">
                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Ordenar por:</label>
                        <select 
                            className="font-bold text-slate-700 outline-none bg-transparent cursor-pointer focus:text-indigo-600"
                            value={sortBy}
                            onChange={(e) => setSortBy(e.target.value)}
                        >
                            <option value="name">Alfabético (Nombre)</option>
                            <option value="course">Agrupar por Curso</option>
                        </select>
                    </div>

                    <button onClick={addStudent} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all flex items-center gap-2">
                        <span className="material-icons-round text-sm">add</span> NUEVO
                    </button>
                </div>

                <div className="grid gap-4">
                    {processedStudents.map(s => (
                        <div key={s.id} className="student-card bg-white p-6 rounded-[2.5rem] flex flex-col lg:flex-row gap-6 items-center">
                            {/* FOTO */}
                            <div className="relative shrink-0">
                                <div className="w-20 h-20 bg-slate-100 rounded-[1.8rem] overflow-hidden border-2 border-dashed border-slate-200 flex items-center justify-center">
                                    {s.photo ? <img src={s.photo} className="w-full h-full object-cover" /> : <span className="text-2xl text-slate-300">👤</span>}
                                </div>
                                <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => {
                                    const reader = new FileReader();
                                    reader.onloadend = () => setStudents(students.map(st => st.id === s.id ? {...st, photo: reader.result} : st));
                                    if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
                                }} />
                                <div className="absolute -bottom-1 -right-1 bg-white p-1 rounded-full border shadow-sm no-print text-[10px]">📸</div>
                            </div>

                            {/* DATOS */}
                            <div className="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-4 w-full">
                                <div className="flex flex-col border-b border-slate-50 pb-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Nombre Completo</label>
                                    <input className="font-bold text-slate-800 outline-none focus:text-indigo-600" value={s.name} placeholder="Ej: Juan Pérez" onChange={(e) => setStudents(students.map(st => st.id === s.id ? {...st, name: e.target.value} : st))} />
                                </div>
                                <div className="flex flex-col border-b border-slate-50 pb-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Curso Asignado</label>
                                    <select className="font-bold text-indigo-600 bg-transparent outline-none cursor-pointer" value={s.course} onChange={(e) => setStudents(students.map(st => st.id === s.id ? {...st, course: e.target.value} : st))}>
                                        {COURSE_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="flex flex-col border-b border-slate-50 pb-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Teléfono Principal</label>
                                    <input className="text-slate-600 outline-none" value={s.phone1} placeholder="600 000 000" onChange={(e) => setStudents(students.map(st => st.id === s.id ? {...st, phone1: e.target.value} : st))} />
                                </div>
                                <div className="flex flex-col border-b border-slate-50 pb-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Email</label>
                                    <input className="text-sm text-slate-500 outline-none" value={s.email} placeholder="correo@ejemplo.com" onChange={(e) => setStudents(students.map(st => st.id === s.id ? {...st, email: e.target.value} : st))} />
                                </div>
                                <div className="flex flex-col border-b border-slate-50 pb-1">
                                    <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Edad</label>
                                    <input type="number" className="font-bold text-slate-800 outline-none w-16" value={s.age} onChange={(e) => setStudents(students.map(st => st.id === s.id ? {...st, age: e.target.value} : st))} />
                                </div>
                            </div>

                            <button onClick={() => setStudents(students.filter(st => st.id !== s.id))} className="text-slate-300 hover:text-red-500 transition no-print p-2">
                                <span className="material-icons-round">delete_outline</span>
                            </button>
                        </div>
                    ))}
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
