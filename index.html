<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Alumnos Pro - Cloud Sync</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";
        window.GoogleGenAI = GoogleGenAI;
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .student-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .student-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: #6366f1; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GITHUB_REPO = "giroparex/gestor-estudiantes"; 
        const FILE_PATH = "alumnos.json";
        const GEMINI_KEY = "AIzaSyCNZCUPHQ6NmoYZ9BBqJOJvYy98SFTOuMw";
        const COURSE_OPTIONS = ["LUNES A VIERNES", "V, S Y D", "INTENSIVO 1", "INTENSIVO 2"];

        const App = () => {
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState("");
            const [ghToken, setGhToken] = useState(localStorage.getItem('gh_token_seguro') || "");
            const [isSaving, setIsSaving] = useState(false);
            
            // Estados para orden y filtro
            const [sortBy, setSortBy] = useState("default");
            const [filterCourse, setFilterCourse] = useState("ALL");

            useEffect(() => {
                const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${FILE_PATH}?t=${Date.now()}`;
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        if (Array.isArray(data)) setStudents(data);
                    })
                    .catch(err => console.log("Iniciando con lista vacía."));
            }, []);

            const saveToGitHub = async () => {
                if (!ghToken) return alert("Por favor, introduce tu Token de GitHub.");
                setIsSaving(true);
                try {
                    const resFile = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                        headers: { Authorization: `token ${ghToken}` }
                    });
                    let sha = "";
                    if (resFile.ok) {
                        const fileData = await resFile.json();
                        sha = fileData.sha;
                    }
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(students, null, 2))));
                    const resUpdate = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                        method: 'PUT',
                        headers: { Authorization: `token ${ghToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: "Update",
                            content: content,
                            sha: sha || undefined 
                        })
                    });
                    if (resUpdate.ok) alert("✅ Sincronizado");
                    else alert("❌ Error al guardar");
                } catch (e) { alert("❌ Error de conexión"); }
                finally { setIsSaving(false); }
            };

            const addStudent = () => {
                const newS = { id: crypto.randomUUID(), name: "", email: "", phone1: "", phone2: "", course: "LUNES A VIERNES", age: 20, photo: null };
                setStudents([newS, ...students]);
            };

            const handlePhoto = (id, file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    setStudents(prev => prev.map(s => s.id === id ? {...s, photo: reader.result} : s));
                };
                reader.readAsDataURL(file);
            };

            const generateIA = async () => {
                setLoading(true);
                try {
                    const genAI = new window.GoogleGenAI(GEMINI_KEY);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const prompt = `Genera un JSON con 2 alumnos. Campos: name, age, email, phone1, phone2, course (lista: ${COURSE_OPTIONS.join(", ")}). SOLO JSON.`;
                    const result = await model.generateContent(prompt);
                    const text = result.response.text().replace(/```json|```/g, "");
                    const parsed = JSON.parse(text).map(s => ({ ...s, id: crypto.randomUUID(), photo: null }));
                    setStudents([...parsed, ...students]);
                } catch (e) { alert("Error con la IA."); }
                finally { setLoading(false); }
            };

            // PROCESAMIENTO: FILTRADO Y LUEGO ORDENADO
            const processedStudents = students
                .filter(s => {
                    const matchesSearch = s.name.toLowerCase().includes(search.toLowerCase());
                    const matchesCourse = filterCourse === "ALL" || s.course === filterCourse;
                    return matchesSearch && matchesCourse;
                })
                .sort((a, b) => {
                    if (sortBy === "name") return a.name.localeCompare(b.name);
                    return 0; // "default" mantiene el orden de creación (nuevos arriba)
                });

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <header className="no-print bg-white p-4 rounded-3xl shadow-sm border mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-2">
                            <span className="material-icons-round text-indigo-600">groups</span>
                            <h1 className="font-black text-slate-800 tracking-tighter uppercase underline decoration-indigo-500">Gestor Alumnos</h1>
                        </div>
                        <div className="flex flex-wrap justify-center gap-2">
                            <input 
                                type="password" 
                                placeholder="Token GitHub"
                                className="border bg-slate-50 p-2 rounded-xl text-xs w-48 outline-none focus:ring-2 ring-indigo-500"
                                value={ghToken}
                                onChange={(e) => {
                                    setGhToken(e.target.value);
                                    localStorage.setItem('gh_token_seguro', e.target.value);
                                }}
                            />
                            <button onClick={saveToGitHub} disabled={isSaving} className={`${isSaving ? 'bg-slate-400' : 'bg-emerald-600'} text-white px-5 py-2 rounded-xl font-bold text-xs hover:bg-emerald-700 transition-all`}>
                                {isSaving ? "..." : "☁️ Guardar"}
                            </button>
                        </div>
                    </header>

                    <div className="no-print flex flex-wrap gap-4 mb-4">
                        <input className="flex-1 min-w-[250px] p-4 rounded-2xl border-none shadow-sm outline-none focus:ring-2 ring-indigo-500" placeholder="Buscar por nombre..." onChange={(e) => setSearch(e.target.value)} />
                        <button onClick={addStudent} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all">+ NUEVO</button>
                        <button onClick={generateIA} disabled={loading} className="bg-purple-600 text-white px-6 py-4 rounded-2xl font-bold hover:bg-purple-700 disabled:opacity-50 shadow-lg shadow-purple-100">
                            {loading ? "..." : "IA ✨"}
                        </button>
                    </div>

                    {/* BARRA DE FILTROS Y ORDEN */}
                    <div className="no-print flex flex-wrap gap-6 mb-8 bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100">
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Ordenar por</label>
                            <select className="bg-white border-none shadow-sm rounded-lg px-3 py-2 text-sm font-bold text-slate-700 outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500" value={sortBy} onChange={(e) => setSortBy(e.target.value)}>
                                <option value="default">Recientes primero</option>
                                <option value="name">Nombre (A-Z)</option>
                            </select>
                        </div>
                        <div className="flex flex-col gap-1">
                            <label className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Filtrar por Curso</label>
                            <select className="bg-white border-none shadow-sm rounded-lg px-3 py-2 text-sm font-bold text-slate-700 outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500" value={filterCourse} onChange={(e) => setFilterCourse(e.target.value)}>
                                <option value="ALL">TODOS LOS CURSOS</option>
                                {COURSE_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="grid gap-4">
                        {processedStudents.map(s => (
                            <div key={s.id} className="student-card bg-white p-6 rounded-[2.5rem] flex flex-col lg:flex-row gap-6 items-center">
                                <div className="relative shrink-0 group">
                                    <div className="w-24 h-24 bg-slate-100 rounded-[2rem] overflow-hidden border-2 border-dashed border-slate-200 flex items-center justify-center">
                                        {s.photo ? <img src={s.photo} className="w-full h-full object-cover" /> : <span className="text-3xl text-slate-300">👤</span>}
                                    </div>
                                    <input type="file" accept="image/*" className="absolute inset-0 opacity-0 cursor-pointer" onChange={(e) => handlePhoto(s.id, e.target.files[0])} />
                                    <div className="absolute -bottom-1 -right-1 bg-white p-1 rounded-full border shadow-sm no-print text-[10px]">📸</div>
                                </div>
                                <div className="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full">
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Nombre</label>
                                        <input className="font-bold text-slate-800 outline-none border-b focus:border-indigo-500 transition-colors" value={s.name} onChange={(e) => setStudents(students.map(st => st.id === s.id ? {...st, name: e.target.value} : st))} />
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Teléfono 1</label>
                                        <input className="text-slate-600 outline-none border-b focus:border-indigo-500" value={s.phone1} onChange={(e) => setStudents(students.map(st => st.id === s.id ? {...st, phone1: e.target.value} : st))} />
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Curso</label>
                                        <select className="font-bold text-indigo-600 bg-transparent outline-none" value={s.course} onChange={(e) => setStudents(students.map(st => st.id === s.id ? {...st, course: e.target.value} : st))}>
                                            {COURSE_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <button onClick={() => setStudents(students.filter(st => st.id !== s.id))} className="text-slate-200 hover:text-red-500 transition no-print">
                                    <span className="material-icons-round">delete</span>
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot
