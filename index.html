<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Alumnos Pro - Cloud Sync</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";
        window.GoogleGenAI = GoogleGenAI;
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .student-card { transition: all 0.3s ease; border: 1px solid #e2e8f0; }
        .student-card:hover { transform: translateY(-3px); shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-color: #6366f1; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURACIÓN DEL REPOSITORIO ---
        const GITHUB_REPO = "giroparex/gestor-estudiantes"; 
        const FILE_PATH = "alumnos.json";
        const GEMINI_KEY = "AIzaSyCNZCUPHQ6NmoYZ9BBqJOJvYy98SFTOuMw";
        const COURSE_OPTIONS = ["LUNES A VIERNES", "V, S Y D", "INTENSIVO 1", "INTENSIVO 2"];

        const App = () => {
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState("");
            const [ghToken, setGhToken] = useState(localStorage.getItem('gh_token_seguro') || "");
            const [isSaving, setIsSaving] = useState(false);
            
            // NUEVOS ESTADOS PARA ORDEN Y FILTRO
            const [sortBy, setSortBy] = useState("default");
            const [filterCourse, setFilterCourse] = useState("ALL");

            // 1. CARGAR DATOS DESDE GITHUB AL INICIAR
            useEffect(() => {
                const url = `https://raw.githubusercontent.com/${GITHUB_REPO}/main/${FILE_PATH}?t=${Date.now()}`;
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        if (Array.isArray(data)) setStudents(data);
                    })
                    .catch(err => console.log("Iniciando con lista vacía o esperando primera sincronización."));
            }, []);

            // 2. FUNCIÓN PARA GUARDAR EN GITHUB (API)
            const saveToGitHub = async () => {
                if (!ghToken) return alert("Por favor, introduce tu Token de GitHub arriba.");
                setIsSaving(true);
                
                try {
                    const resFile = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                        headers: { Authorization: `token ${ghToken}` }
                    });
                    
                    let sha = "";
                    if (resFile.ok) {
                        const fileData = await resFile.json();
                        sha = fileData.sha;
                    }

                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(students, null, 2))));
                    
                    const resUpdate = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                        method: 'PUT',
                        headers: { 
                            Authorization: `token ${ghToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: "Actualización automática desde Gestor Alumnos",
                            content: content,
                            sha: sha || undefined 
                        })
                    });

                    if (resUpdate.ok) {
                        alert("✅ ¡Sincronizado con GitHub! Los datos ya están guardados en la nube.");
                    } else {
                        const error = await resUpdate.json();
                        alert("❌ Error: " + error.message);
                    }
                } catch (e) {
                    alert("❌ Error de conexión con GitHub.");
                } finally { setIsSaving(false); }
            };

            const addStudent = () => {
                const newS = { id: crypto.randomUUID(), name: "", email: "", phone1: "", phone2: "", course: "LUNES A VIERNES", age: 20, photo: null };
                setStudents([newS, ...students]);
            };

            const handlePhoto = (id, file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    setStudents(prev => prev.map(s => s.id === id ? {...s, photo: reader.result} : s));
                };
                reader.readAsDataURL(file);
            };

            const generateIA = async () => {
                setLoading(true);
                try {
                    const genAI = new window.GoogleGenAI(GEMINI_KEY);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const prompt = `Genera un JSON con 2 alumnos. Campos: name, age, email, phone1, phone2, course (lista: ${COURSE_OPTIONS.join(", ")}). SOLO JSON.`;
                    const result = await model.generateContent(prompt);
                    const text = result.response.text().replace(/```json|```/g, "");
                    const parsed = JSON.parse(text).map(s => ({ ...s, id: crypto.randomUUID(), photo: null }));
                    setStudents([...parsed, ...students]);
                } catch (e) { alert("Error con la IA."); }
                finally { setLoading(false); }
            };

            // LÓGICA DE PROCESAMIENTO DE LISTA (FILTRO + ORDEN)
            const processedStudents = students
                .filter(s => {
                    const matchesSearch = s.name.toLowerCase().includes(search.toLowerCase());
                    const matchesCourse = filterCourse === "ALL" || s.course === filterCourse;
                    return matchesSearch && matchesCourse;
                })
                .sort((a, b) => {
                    if (sortBy === "name") return a.name.localeCompare(b.name);
                    return 0;
                });

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    {/* BARRA SUPERIOR DE SINCRONIZACIÓN */}
                    <header className="no-print bg-white p-4 rounded-3xl shadow-sm border mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-2">
                            <span className="material-icons-round" style={{verticalAlign: 'middle', marginRight: '5px'}}>groups</span>
                            <h1 className="font-black text-slate-800 tracking-tighter uppercase">Gestor Alumnos</h1>
                        </div>
                        
                        <div className="flex flex-wrap justify-center gap-2">
                            <input 
                                type="password" 
                                placeholder="Token de GitHub (ghp_...)"
                                className="border bg-slate-50 p-2 rounded-xl text-xs w-48 outline-none focus:ring-2 ring-indigo-500"
                                value={ghToken}
                                onChange={(e) => {
                                    setGhToken(e.target.value);
                                    localStorage.setItem('gh_token_seguro', e.target.value);
                                }}
                            />
                            <button 
                                onClick={saveToGitHub}
                                disabled={isSaving}
                                className={`${isSaving ? 'bg-slate-400' : 'bg-emerald-600'} text-white px-5 py-2 rounded-xl font-bold text-xs flex items-center gap-2 hover:bg-emerald-700 transition-all`}
                            >
                                {isSaving ? "Guardando..." : "☁️ Guardar en GitHub"}
