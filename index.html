<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Estudiantes Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";
        window.GoogleGenAI = GoogleGenAI;
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .student-card { transition: all 0.3s ease; }
        .student-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const API_KEY = "AIzaSyCNZCUPHQ6NmoYZ9BBqJOJvYy98SFTOuMw";
        const COURSE_OPTIONS = ["LUNES A VIERNES", "V, S Y D", "INTENSIVO 1", "INTENSIVO 2"];

        const App = () => {
            const [students, setStudents] = useState([]);
            const [loading, setLoading] = useState(false);
            const [search, setSearch] = useState("");
            const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'asc' });

            // --- FUNCIONES DE FOTO ---
            const handlePhotoUpload = (id, file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    updateStudent(id, 'photo', reader.result);
                };
                reader.readAsDataURL(file);
            };

            // --- GESTIÓN DE DATOS ---
            const addStudent = () => {
                const newS = { id: crypto.randomUUID(), name: "", email: "", course: "LUNES A VIERNES", age: 20, photo: null };
                setStudents([newS, ...students]);
            };

            const updateStudent = (id, field, value) => {
                setStudents(prev => prev.map(s => s.id === id ? {...s, [field]: value} : s));
            };

            const deleteStudent = (id) => {
                if(confirm("¿Eliminar este alumno?")) setStudents(students.filter(s => s.id !== id));
            };

            // --- IA ---
            const generateIA = async () => {
                if (!window.GoogleGenAI) return alert("Cargando motor de IA... espera un segundo.");
                setLoading(true);
                try {
                    const genAI = new window.GoogleGenAI(API_KEY);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const prompt = `Genera un JSON con 3 alumnos. Campos: name, age, email, course (elige de: ${COURSE_OPTIONS.join(", ")}). Responde solo el JSON.`;
                    
                    const result = await model.generateContent(prompt);
                    const text = result.response.text().replace(/```json|```/g, "");
                    const parsed = JSON.parse(text).map(s => ({ ...s, id: crypto.randomUUID(), photo: null }));
                    setStudents([...parsed, ...students]);
                } catch (e) {
                    alert("Error en la IA. Verifica tu API Key.");
                } finally { setLoading(false); }
            };

            // --- ORGANIZACIÓN (SORT) ---
            const sortedStudents = [...students].sort((a, b) => {
                if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'asc' ? -1 : 1;
                if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-10">
                    <header className="flex justify-between items-center mb-8 no-print">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-xl text-white">👤</div>
                            <h1 className="text-2xl font-black text-slate-800 tracking-tight">STUDENT<span className="text-indigo-600">MANAGER</span></h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => window.print()} className="px-4 py-2 border rounded-xl hover:bg-white transition shadow-sm">Imprimir</button>
                        </div>
                    </header>

                    <div className="no-print bg-white p-4 rounded-3xl shadow-sm border mb-6 flex flex-wrap gap-4 items-center">
                        <input 
                            className="flex-1 min-w-[200px] bg-slate-50 border-none p-3 rounded-2xl outline-none ring-indigo-500 focus:ring-2" 
                            placeholder="Buscar alumnos..." 
                            onChange={(e) => setSearch(e.target.value)}
                        />
                        <select 
                            className="bg-slate-50 p-3 rounded-2xl text-sm font-bold text-slate-600 outline-none"
                            onChange={(e) => setSortConfig({ ...sortConfig, key: e.target.value })}
                        >
                            <option value="name">Ordenar por Nombre</option>
                            <option value="course">Ordenar por Curso</option>
                            <option value="age">Ordenar por Edad</option>
                        </select>
                        <button onClick={() => setSortConfig({ ...sortConfig, direction: sortConfig.direction === 'asc' ? 'desc' : 'asc' })} className="p-3 bg-slate-50 rounded-2xl">
                            {sortConfig.direction === 'asc' ? "↑" : "↓"}
                        </button>
                        <div className="flex gap-2 ml-auto">
                            <button onClick={addStudent} className="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-800 transition">+ Nuevo</button>
                            <button onClick={generateIA} disabled={loading} className="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold hover:bg-indigo-700 flex gap-2 items-center">
                                {loading ? "..." : "IA ✨"}
                            </button>
                        </div>
                    </div>

                    <div className="grid gap-4">
                        {sortedStudents.filter(s => s.name.toLowerCase().includes(search.toLowerCase())).map(s => (
                            <div key={s.id} className="student-card bg-white p-5 rounded-3xl border border-slate-100 flex flex-col md:flex-row gap-6 items-center">
                                
                                {/* SECCIÓN FOTO */}
                                <div className="relative group">
                                    <div className="w-20 h-20 bg-slate-100 rounded-2xl overflow-hidden border-2 border-dashed border-slate-200 flex items-center justify-center">
                                        {s.photo ? (
                                            <img src={s.photo} className="w-full h-full object-cover" />
                                        ) : (
                                            <span className="text-slate-300 text-2xl">📸</span>
                                        )}
                                    </div>
                                    <input 
                                        type="file" 
                                        accept="image/*" 
                                        className="absolute inset-0 opacity-0 cursor-pointer" 
                                        onChange={(e) => handlePhotoUpload(s.id, e.target.files[0])}
                                    />
                                </div>

                                <div className="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 w-full">
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Nombre</label>
                                        <input className="font-bold text-slate-700 outline-none border-b border-transparent focus:border-indigo-400" value={s.name} onChange={(e) => updateStudent(s.id, 'name', e.target.value)} />
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Email</label>
                                        <input className="text-slate-500 text-sm outline-none" value={s.email} onChange={(e) => updateStudent(s.id, 'email', e.target.value)} />
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Curso</label>
                                        <select className="text-sm font-bold text-indigo-600 bg-transparent outline-none" value={s.course} onChange={(e) => updateStudent(s.id, 'course', e.target.value)}>
                                            {COURSE_OPTIONS.map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex flex-col">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Edad</label>
                                        <input type="number" className="font-bold text-slate-700 outline-none" value={s.age} onChange={(e) => updateStudent(s.id, 'age', e.target.value)} />
                                    </div>
                                </div>

                                <button onClick={() => deleteStudent(s.id)} className="text-slate-300 hover:text-red-500 transition no-print px-2">
                                    ✕
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
